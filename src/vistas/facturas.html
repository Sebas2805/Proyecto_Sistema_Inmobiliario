        <div class="mt-2">

                    <div class="row mb-4">
                        <div class="col-md-7">
                            <h4 class="text-primary">Gestión de Facturas</h4>
                        </div>
                        <div class="col-md-3">
                            <div class="input-group">
                                <div class="form-outline" data-mdb-input-init>
                                    <input type="search" id="searchFactura" class="form-control" />

                                </div>
                                <button class="btn btn-primary">
                                    <i class="fas fa-search"></i>
                                </button>
                            </div>
                        </div>
                        <div class="col-md-2">
                            <button class="btn btn-primary" onclick="abrirModalFactura()" data-mdb-modal-init

    <div class="modal fade" id="modalFactura" data-mdb-backdrop="static" tabindex="-1" data-mdb-keyboard="false"
        aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 id="tituloFactura">Nueva Factura</h5>
                    <button type="button" class="btn-close" data-mdb-ripple-init data-mdb-dismiss="modal"
                        aria-label="Close"></button>
                </div>

                <div class="modal-body">

                    <form onsubmit="guardarFactura(event)">

                        <input type="hidden" id="facturaId">

                        <div class="mb-3">
                            <select id="clienteFactura" class="form-select" data-mdb-select-init
                                onchange="filtrarContratos()"></select>
                            <label class="form-label select-label">Cliente</label>
                        </div>


                        <div class="mb-3">
                            <select id="contratoFactura" class="form-select" data-mdb-select-init></select>
                            <label class="form-label select-label">Contrato</label>
                        </div>


                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-outline mb-3" data-mdb-input-init>
                                    <input type="date" id="fechaEmision" class="form-control" required />
                                    <label class="form-label">Fecha emisión</label>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="form-outline mb-3" data-mdb-input-init>
                                    <input type="date" id="fechaVencimiento" class="form-control" required />
                                    <label class="form-label">Fecha vencimiento</label>
                                </div>
                            </div>
                        </div>

                        <div class="form-outline mb-3" data-mdb-input-init>
                            <input type="number" id="montoTotal" class="form-control" required />
                            <label class="form-label">Monto total</label>
                        </div>


                        <div class="mb-3">
                            <select id="estadoFactura" class="form-select" data-mdb-select-init>
                                <option value="Pendiente">Pendiente</option>
                                <option value="Pagada">Pagada</option>
                                <option value="Vencida">Vencida</option>
                                <option value="Anulada">Anulada</option>
                            </select>
                            <label class="form-label select-label">Estado</label>
                        </div>

                        <button class="btn btn-primary w-100">
                            Guardar Factura
                        </button>

                    </form>

                </div>

            </div>
        </div>
    </div>
    <script>
        if (!localStorage.getItem("usuario")) {
            window.location.href = "index.html";
        }
        const API_URL = "http://localhost:5000/api";
        let clientesGlobal = [];
        let contratosGlobal = [];
        let facturasGlobal = [];
        let mapaClientesGlobal = {};
        let paginaActual = 1;
        const porPagina = 6;

        document.addEventListener("DOMContentLoaded", () => {
            cargarFacturas();
            activarBuscador();
        });

        async function cargarFacturas() {
            try {
                const [resFact, resClientes] = await Promise.all([
                    fetch(`${API_URL}/facturas`),
                    fetch(`${API_URL}/clientes`)
                ]);

                const facturas = await resFact.json();
                const clientes = await resClientes.json();

                mapaClientesGlobal = {};
                clientes.forEach(c => mapaClientesGlobal[c._id] = c);

                facturasGlobal = facturas;
                paginaActual = 1;

                renderLista();

            } catch (error) {
                console.error(error);
            }
        }


        function renderLista() {
            const inicio = (paginaActual - 1) * porPagina;
            const fin = inicio + porPagina;

            const paginaData = facturasGlobal.slice(inicio, fin);

            renderFacturas(paginaData);
            renderPaginacion();
        }


        function renderFacturas(facturas) {
            const contenedor = document.getElementById("contenedorFacturas");
            contenedor.innerHTML = "";

            if (facturas.length === 0) {
                contenedor.innerHTML = `<p>No hay facturas</p>`;
                return;
            }

            facturas.forEach(f => {

                const cliente = mapaClientesGlobal[f.cliente_id];

                contenedor.innerHTML += `
    <div class="col-md-4 mb-4">
      <div class="card h-100">

        <div class="card-header">
          <button class="btn btn-sm btn-outline-primary me-2"
                onclick='editarFactura(${JSON.stringify(f)})'>
                Editar
              </button>
        </div>

        <div class="card-body">

          <p>Consecutivo Factura: #${f._id || 0}</p>

          <p>Número contrato: #${f.contrato_id || 0}</p>

          <p>Fecha de Emisión: ${formatearFecha(f.fecha_emision)}</p>

          <p>Fecha de Vencimiento: ${formatearFecha(f.fecha_vencimiento)}</p>

          <p>Cliente: ${cliente?.nombre || "N/A"}</p>

          <p>Estado:
            <span class="badge ${f.estado === "Pagada" ? "bg-success" :
                        f.estado === "Pendiente" ? "bg-warning" :
                            f.estado === "Vencida" ? "bg-danger" : "bg-secondary"
                    }">
              ${f.estado}
            </span>
          </p>

          <hr>

          <p class="fw-bold">Información Orden de compra</p>

          

          ${f.detalle && f.detalle.length > 0
                        ? f.detalle.map(d => `
                <p>Descripción: ${d.descripcion || "-"}</p>
                <p>Monto: $${d.monto || 0}</p>
              `).join("")
                        : `<p>Sin detalle</p>`
                    }
            <p><strong>Total:</strong> $${f.monto_total || 0}</p>
        </div>

      </div>
    </div>
    `;
            });
        }


        function renderPaginacion() {
            const totalPaginas = Math.ceil(facturasGlobal.length / porPagina);
            const pag = document.getElementById("paginacion");

            pag.innerHTML = "";


            pag.innerHTML += `
    <li class="page-item ${paginaActual === 1 ? "disabled" : ""}">
      <a class="page-link" href="#" onclick="cambiarPagina(${paginaActual - 1})">
        Previous
      </a>
    </li>
  `;


            for (let i = 1; i <= totalPaginas; i++) {
                pag.innerHTML += `
      <li class="page-item ${i === paginaActual ? "active" : ""}">
        <a class="page-link" href="#" onclick="cambiarPagina(${i})">
          ${i}
        </a>
      </li>
    `;
            }


            pag.innerHTML += `
    <li class="page-item ${paginaActual === totalPaginas ? "disabled" : ""}">
      <a class="page-link" href="#" onclick="cambiarPagina(${paginaActual + 1})">
        Next
      </a>
    </li>
  `;
        }


        function cambiarPagina(p) {
            const totalPaginas = Math.ceil(facturasGlobal.length / porPagina);

            if (p < 1 || p > totalPaginas) return;

            paginaActual = p;
            renderLista();

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }


        function activarBuscador() {
            const input = document.getElementById("searchFactura");

            input.addEventListener("input", function () {
                const valor = this.value.toLowerCase();

                const filtradas = facturasGlobal.filter(f =>
                    JSON.stringify(f).toLowerCase().includes(valor)
                );

                paginaActual = 1;

                renderFacturas(filtradas);
                renderPaginacionFiltrada(filtradas);
            });
        }


        function renderPaginacionFiltrada(data) {
            const totalPaginas = Math.ceil(data.length / porPagina);
            const pag = document.getElementById("paginacion");

            pag.innerHTML = "";

            for (let i = 1; i <= totalPaginas; i++) {
                pag.innerHTML += `
      <li class="page-item ${i === paginaActual ? "active" : ""}">
        <a class="page-link" href="#" onclick="cambiarPagina(${i})">${i}</a>
      </li>
    `;
            }
        }


        function formatearFecha(fecha) {
            if (!fecha) return "-";
            return new Date(fecha).toLocaleDateString();
        }
        async function cargarSelectsFactura() {
            const [resClientes, resContratos] = await Promise.all([
                fetch(`${API_URL}/clientes`),
                fetch(`${API_URL}/contratos`)
            ]);

            clientesGlobal = await resClientes.json();
            contratosGlobal = await resContratos.json();

            const selectCliente = document.getElementById("clienteFactura");

            selectCliente.innerHTML = `<option value="">Seleccione cliente</option>`;

            clientesGlobal.forEach(c => {
                selectCliente.innerHTML += `<option value="${c._id}">${c.nombre}</option>`;
            });

            refrescarSelectMDB("clienteFactura");
        }
        function filtrarContratos() {
            const clienteId = document.getElementById("clienteFactura").value;
            const selectContrato = document.getElementById("contratoFactura");

            selectContrato.innerHTML = `<option value="">Seleccione contrato</option>`;

            const filtrados = contratosGlobal.filter(c => c.cliente_id === clienteId);

            filtrados.forEach(c => {
                selectContrato.innerHTML += `
      <option value="${c._id}">
        Contrato #${c._id}
      </option>
    `;
            });

            refrescarSelectMDB("contratoFactura");
        }
        function abrirModalFactura() {
            document.getElementById("tituloFactura").innerText = "Nueva Factura";
            document.getElementById("facturaId").value = "";
            document.querySelector("#modalFactura form").reset();

            document.getElementById("clienteFactura").disabled = false;
            document.getElementById("contratoFactura").disabled = false;
            document.getElementById("fechaEmision").disabled = false;
            document.getElementById("fechaVencimiento").disabled = false;

            cargarSelectsFactura();
            refrescarSelectMDB("clienteFactura");
            refrescarSelectMDB("contratoFactura");
            refrescarSelectMDB("estadoFactura");
        }
        async function editarFactura(f) {
            document.getElementById("tituloFactura").innerText = "Editar Factura";

            document.getElementById("facturaId").value = f._id;

            await cargarSelectsFactura();

            document.getElementById("clienteFactura").value = f.cliente_id;

            filtrarContratos();

            document.getElementById("contratoFactura").value = f.contrato_id;

            document.getElementById("fechaEmision").value = f.fecha_emision?.split("T")[0];
            document.getElementById("fechaVencimiento").value = f.fecha_vencimiento?.split("T")[0];

            document.getElementById("montoTotal").value = f.monto_total;
            document.getElementById("estadoFactura").value = f.estado;

            document.getElementById("clienteFactura").disabled = true;
            document.getElementById("contratoFactura").disabled = true;
            document.getElementById("fechaEmision").disabled = true;
            document.getElementById("fechaVencimiento").disabled = true;

            refrescarSelectMDB("clienteFactura");
            refrescarSelectMDB("contratoFactura");
            refrescarSelectMDB("estadoFactura");

            const modal = new mdb.Modal(document.getElementById("modalFactura"));
            modal.show();
        }
        async function guardarFactura(e) {
            e.preventDefault();

            const id = document.getElementById("facturaId").value;

            const data = {
                cliente_id: document.getElementById("clienteFactura").value,
                contrato_id: document.getElementById("contratoFactura").value,
                fecha_emision: document.getElementById("fechaEmision").value,
                fecha_vencimiento: document.getElementById("fechaVencimiento").value,
                monto_total: Number(document.getElementById("montoTotal").value),
                estado: document.getElementById("estadoFactura").value
            };

            try {
                if (id) {
                    await fetch(`${API_URL}/facturas/${id}`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            monto_total: data.monto_total,
                            estado: data.estado
                        })
                    });
                } else {
                    await fetch(`${API_URL}/facturas`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(data)
                    });
                }

                Swal.fire("Éxito", "Factura guardada correctamente", "success");
                document.activeElement.blur();
                const modal = mdb.Modal.getInstance(document.getElementById("modalFactura"));
                modal.hide();

                cargarFacturas();
                window.location.reload();

            } catch (error) {
                console.error(error);
                Swal.fire("Error", "No se pudo guardar", "error");
            }
        }
        function refrescarSelectMDB(id) {
            const el = document.getElementById(id);

            const instance = mdb.Select.getInstance(el);
            if (instance) instance.dispose();

            new mdb.Select(el);
        }
    </script>

        integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct"
        crossorigin="anonymous"></script>
