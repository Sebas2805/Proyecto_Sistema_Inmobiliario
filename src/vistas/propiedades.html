        <div class="modal fade" id="modalPropiedad" tabindex="-1" aria-labelledby="modalPropiedadLabel"

            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">

                    <div class="modal-header">

                        <button type="button" class="btn-close" data-mdb-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">

                        <form id="formPropiedad" onsubmit="guardarPropiedad(event)">

                                    <option value="Vendida">Vendida</option>
                                    <option value="En mantenimiento">En mantenimiento</option>
                                </select>
                                <label class="form-label select-label">Estado</label>
                            </div>


                            <div class="form-outline mb-3" data-mdb-input-init>

                                <label class="form-label">Dirección</label>

                                Guardar

    <script>
        if (!localStorage.getItem("usuario")) {
            window.location.href = "index.html";
        }
        const API_URL = "http://localhost:5000/api";

        const params = new URLSearchParams(window.location.search);
        const idProyecto = params.get("proyecto");


        document.addEventListener("DOMContentLoaded", () => {
            if (!idProyecto) {
                alert("No se recibió el ID del proyecto");
                return;
            }
            cargarPropiedades();
        });

        async function cargarPropiedades() {
            const contenedor = document.getElementById("contenedorPropiedades");

            contenedor.innerHTML = `<div class="text-center">Cargando propiedades...</div>`;

            try {
                const res = await fetch(`${API_URL}/propiedades`);
                const data = await res.json();

                const filtradas = data.filter(p =>
                    p.proyecto_id?._id === idProyecto || p.proyecto_id === idProyecto
                );

                renderPropiedades(filtradas);

            } catch (error) {
                console.error(error);
                contenedor.innerHTML = `<div class="text-danger">Error cargando propiedades</div>`;
            }
        }

        function renderPropiedades(data) {
            const contenedor = document.getElementById("contenedorPropiedades");

            contenedor.innerHTML = "";

            if (data.length === 0) {
                contenedor.innerHTML = `
      <div class="text-center w-100">
        <h5>No hay propiedades</h5>
        <p>Agrega una nueva propiedad</p>
      </div>
    `;
                return;
            }

            data.forEach(p => {
                contenedor.innerHTML += `
      <div class="col-md-4 mb-4">
        <div class="card shadow-sm propiedad-card">

          <img src="https://picsum.photos/400/250?random=${Math.random()}" class="card-img-top"/>

          <div class="card-body">
            <h5>${p.codigo}</h5>
            <p class="text-muted">${p.direccion || "Sin dirección"}</p>

            <div class="d-flex justify-content-between mb-2">
              <span>${p.area_m2 || 0} m²</span>
              <span class="badge ${p.estado === "Disponible" ? "bg-success" :
                        p.estado === "Vendida" ? "bg-danger" :
                            p.estado === "Alquilada" ? "bg-warning" :
                                "bg-secondary"
                    }">${p.estado}</span>
            </div>

            <p class="fw-bold">
             Precio de venta: $${p.precio_venta || 0}
            </p>
            <p class="fw-bold">
              Precio de alquiler: $${p.precio_alquiler || 0}
            </p>
            <div class="d-flex justify-content-end">
              <button class="btn btn-sm btn-primary me-2"
                onclick='editarPropiedad(${JSON.stringify(p)})'>
                Editar
              </button>

              <button class="btn btn-sm btn-danger"
                onclick="eliminarPropiedad('${p._id}')">
                 Eliminar
              </button>
            </div>
          </div>

        </div>
      </div>
    `;
            });
        }

        function abrirModal() {
            document.getElementById("propiedadId").value = "";
            document.getElementById("formPropiedad").reset();

            const modal = new mdb.Modal(document.getElementById("modalPropiedad"));
            modal.show();
        }

        function editarPropiedad(p) {
            if (!document.getElementById("codigo")) {
                console.error("El input codigo no existe");
                return;
            }
            document.getElementById("propiedadId").value = p._id;
            document.getElementById("codigo").value = p.codigo;
            document.getElementById("tipo").value = p.tipo;
            document.getElementById("area").value = p.area_m2;
            document.getElementById("precio").value = p.precio_venta || p.precio_alquiler;
            document.getElementById("estado").value = p.estado;
            document.getElementById("direccion").value = p.direccion;

            const modal = new mdb.Modal(document.getElementById("modalPropiedad"));
            modal.show();
        }

        async function guardarPropiedad(e) {
            e.preventDefault();

            const id = document.getElementById("propiedadId").value;

            const data = {
                codigo: document.getElementById("codigo").value,
                tipo: document.getElementById("tipo").value,
                area_m2: Number(document.getElementById("area").value),
                precio_venta: Number(document.getElementById("precio").value),
                estado: document.getElementById("estado").value,
                direccion: document.getElementById("direccion").value,
                proyecto_id: idProyecto
            };

            try {
                if (id) {
                    await fetch(`${API_URL}/propiedades/${id}`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(data)
                    });
                } else {
                    await fetch(`${API_URL}/propiedades`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(data)
                    });
                }

                const modal = mdb.Modal.getInstance(document.getElementById("modalPropiedad"));
                modal.hide();

                cargarPropiedades();

            } catch (error) {
                console.error(error);
                alert("Error guardando propiedad");
            }
        }

        async function eliminarPropiedad(id) {

            const result = await Swal.fire({
                title: '¿Eliminar propiedad?',
                text: 'Esta acción no se puede deshacer',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#1D428A',
                cancelButtonColor: '#CD5151 ',
                confirmButtonText: 'Sí, eliminar',
                cancelButtonText: 'Cancelar'
            });

            if (result.isConfirmed) {
                try {
                    await fetch(`${API_URL}/propiedades/${id}`, {
                        method: "DELETE"
                    });

                    await Swal.fire({
                        icon: 'success',
                        title: 'Eliminado',
                        text: 'Propiedad eliminada correctamente',
                        timer: 1500,
                        showConfirmButton: false
                    });

                    cargarPropiedades();

                } catch (error) {
                    console.error(error);

                    Swal.fire({
                        icon: 'error',
                        title: 'Error',
                        text: 'No se pudo eliminar la propiedad'
                    });
                }
            }
        }
    </script>
