<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.1.0/mdb.min.css"
        integrity="sha512-nzSGtgaJWS79WO+bCKLhowPkjbM+WI18/K4T77XPB4QPMybSKLozMFzDNPEHcWxN1dOx1gvYGKP39nXLNNZ8qg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.1.0/mdb.min.css"
        integrity="sha512-nzSGtgaJWS79WO+bCKLhowPkjbM+WI18/K4T77XPB4QPMybSKLozMFzDNPEHcWxN1dOx1gvYGKP39nXLNNZ8qg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/login.css" asp-append-version="true" />

</head>

<body>
    <header>

    </header>

    <main role="main" class="pb-3">
        <!--Inicio de sesión-->
        <div class="carousel">
            <div class="carousel-item active">
                <img src="img/ed1C.jpg" class="d-block jumbotron-image" alt="ALESTE">
            </div>
            <div class="carousel-item">
                <img src="img/ed1C.jpg" class="d-block jumbotron-image" alt="AVENIDA">
            </div>
            <div class="carousel-item">
                <img src="img/ed1C.jpg" class="d-block jumbotron-image" alt="TorreU">
            </div>
            <div class="carousel-item">
                <img src="img/ed1C.jpg" class="d-block jumbotron-image" alt="TorreU_2">
            </div>
        </div>
        <div class="contenedor-login">
            <div class="contenedor-login">
                <div class="login-box">
                    <div class="card card-outline card-primary">
                        <div class="text-center">
                            <div>
                                <img class="img-login" src="img/LG.png" alt="Logo Compañía" width="250" />
                            </div>
                            <p class="titulo-sistema"><b> Sistema Gestión<br />Inmobiliario</b></p>

                        </div>
                        <div class="card-body">
                            <p class="login-box-msg text-center">Iniciar sesión</p>
                            <form method="post" onsubmit="registrarUsuario(event)">
                                <div class="form-outline mb-3" data-mdb-input-init>
                                    <input type="text" id="identificacion" class="form-control" required />
                                    <label class="form-label">Identificación</label>
                                </div>

                                <div class="form-outline mb-3" data-mdb-input-init>
                                    <input type="email" id="correoRegistro" class="form-control" required />
                                    <label class="form-label">Correo</label>
                                </div>

                                <div class="form-outline mb-3" data-mdb-input-init>
                                    <input type="password" id="passRegistro" class="form-control" required />
                                    <label class="form-label">Contraseña</label>
                                </div>
                                <br />
                                <div class="row">
                                    <div class="col-12 ">
                                        <button type="submit" id="btnLogin"
                                            class="btn btn-primary btn-block">Registrarse</button>
                                    </div>
                                </div>
                                <br />
                                <div class="text-center mt-3">
                                    <a href="index.html">¿Ya tienes cuenta? Iniciar sesión</a>
                                </div>
                                <span class="text-danger text-danger"></span>
                                <div class="row justify-content-md-center">
                                    <div class="text-danger "></div>
                                </div>
                            </form>
                            <br />
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        document.querySelectorAll('.form-outline').forEach((formOutline) => {
            new mdb.Input(formOutline).init();
        });

    </script>
    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.carousel-item');
        const interval = 10000;

        function showSlide(slideIndex) {
            slides[currentSlide].classList.remove('active');
            currentSlide = slideIndex;
            slides[currentSlide].classList.add('active');
        }

        function nextSlide() {
            const nextSlideIndex = (currentSlide + 1) % slides.length;
            showSlide(nextSlideIndex);
        }

        function startCarousel() {
            showSlide(0);
            setInterval(nextSlide, interval);
        }

        startCarousel();
        document.querySelectorAll('.form-outline').forEach((formOutline) => {
            new mdb.Input(formOutline).init();
        });
        async function registrarUsuario(e) {
            e.preventDefault();

            const identificacion = document.getElementById("identificacion").value.trim();
            const correo = document.getElementById("correoRegistro").value.trim();
            const contrasena = document.getElementById("passRegistro").value.trim();

            if (contrasena.length < 6) {
                Swal.fire("Error", "La contraseña debe tener mínimo 6 caracteres", "error");
                return;
            }

            const data = { identificacion, correo, contrasena };

            try {
                const res = await fetch("http://localhost:5000/api/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                if (!res.ok) {
                    Swal.fire("Información", result.message, "warning");
                    return;
                }

                Swal.fire({
                    title: "Registro exitoso",
                    text: "Ahora puedes iniciar sesión",
                    icon: "success",
                    confirmButtonColor: '#1D428A',
                    confirmButtonText: "Ir al login"
                }).then(() => {
                    window.location.href = "index.html";
                });

                e.target.reset();

            } catch (error) {
                console.error(error);
                Swal.fire("Error", "No se pudo registrar", "error");
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/6.1.0/mdb.min.js"
        integrity="sha512-oFBfx20Vuw8reYrngBlvcrgBmDcEAPE0Vv7Rb9b7JYZNHmDFdxZhiOTGm0CePa7ouSwfty9qwHQck1aVGWK5tA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="js/site.js" asp-append-version="true"></script>
    <script src="https://kit.fontawesome.com/4b2f294736.js" crossorigin="anonymous"></script>
</body>

</html>
