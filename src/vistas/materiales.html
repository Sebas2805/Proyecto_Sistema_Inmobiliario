        <div class="modal fade" id="modalMaterial" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">

                    <div class="modal-header">
                        <h5 id="tituloMaterial">Nuevo Material</h5>
                        <button class="btn-close" data-mdb-dismiss="modal"></button>
                    </div>

                    <div class="modal-body">
                        <form onsubmit="guardarMaterial(event)">

                            <input type="hidden" id="materialId">

                            <div class="form-outline mb-3" data-mdb-input-init>
                                <input type="text" id="nombreMaterial" class="form-control" required />
                                <label class="form-label">Nombre</label>
                            </div>

                            <div class="form-outline mb-3" data-mdb-input-init>
                                <input type="text" id="unidadMaterial" class="form-control" />
                                <label class="form-label">Unidad de medida</label>
                            </div>

                            <div class="form-outline mb-3" data-mdb-input-init>
                                <input type="number" id="stockMaterial" class="form-control" />
                                <label class="form-label">Stock</label>
                            </div>

                            <div class="form-outline mb-3" data-mdb-input-init>
                                <input type="number" id="precioMaterial" class="form-control" />
                                <label class="form-label">Precio unitario</label>
                            </div>

                            <button class="btn btn-primary w-100">Guardar</button>

                        </form>
                    </div>

            </div>

    <script>
        if (!localStorage.getItem("usuario")) {
            window.location.href = "index.html";
        }
        const API_URL = "http://localhost:5000/api";
        const params = new URLSearchParams(window.location.search);
        const idBodega = params.get("bodega");
        let timeoutBusqueda;
        let table;
        document.addEventListener("DOMContentLoaded", () => {
            cargarNombreBodega();
            cargarMateriales();
            activarBuscador();
        });
        async function cargarMateriales() {
            const tabla = document.getElementById("tablaMateriales");

            if (!idBodega) {
                tabla.innerHTML = `<tr><td colspan="5">No se seleccionó una bodega</td></tr>`;
                return;
            }

            try {
                const res = await fetch(`${API_URL}/materiales`);
                const data = await res.json();

                const filtrados = data.filter(m =>
                    m.bodega_id === idBodega ||
                    m.bodega_id?._id === idBodega
                );

                tabla.innerHTML = "";

                if (filtrados.length === 0) {
                    tabla.innerHTML = `<tr><td colspan="5">No hay materiales en esta bodega</td></tr>`;
                    return;
                }

                filtrados.forEach(m => {
                    tabla.innerHTML += `
        <tr>
          <td>${m.nombre}</td>
          <td>${m.unidad_medida || "-"}</td>
          <td>${m.stock_actual || 0}</td>
          <td>$ ${m.precio_unitario || 0}</td>
          <td>
            <button class="btn-table"
              onclick='editarMaterial(${JSON.stringify(m)})'>
              <i class="fa fa-edit"></i>
            </button>

            <button class="btn-table"
              onclick="eliminarMaterial('${m._id}')">
              <i class="fa-regular fa-trash"></i>
            </button>
          </td>
        </tr>
      `;
                });
                if ($.fn.DataTable.isDataTable('#Materiales')) {
                    $('#Materiales').DataTable().destroy();
                }

                inicializarDataTable();

            } catch (error) {
                console.error(error);
                tabla.innerHTML = `<tr><td colspan="5">Error cargando materiales</td></tr>`;
            }
        }
        function inicializarDataTable() {
            table = $('#Materiales').DataTable({
                info: false,
                ordering: true,
                dom: 'Brtip',
                buttons: [
                    {
                        extend: 'csv',
                        text: '<button class="btnTableSecond"><i class="fa-light fa-file-csv"></i></button>',
                    },
                    {
                        extend: 'excel',
                        text: '<button class="btnTableprimary"><i class="fa-light fa-file-xls"></i></button>',
                    },
                    {
                        extend: 'pdf',
                        text: '<button class="btnTableSecond"><i class="fa-light fa-file-pdf"></i></button>',
                    },
                ],
                responsive: true,
                language: {
                    decimal: "",
                    emptyTable: "No hay información",
                    info: "Mostrando _START_ a _END_ de _TOTAL_ Entradas",
                    infoEmpty: "Mostrando 0 a 0 de 0 Entradas",
                    infoFiltered: "(Filtrado de _MAX_ total entradas)",
                    lengthMenu: "Mostrar _MENU_ Entradas",
                    loadingRecords: "Cargando...",
                    processing: "Procesando...",
                    search: "Buscar:",
                    zeroRecords: "Sin resultados encontrados",
                    paginate: {
                        first: "Primero",
                        last: "Último",
                        next: "Siguiente",
                        previous: "Anterior"
                    }
                }
            });
        }
        function activarBuscador() {
            const input = document.getElementById("searchmateriales");

            input.addEventListener("input", function () {
                clearTimeout(timeoutBusqueda);

                timeoutBusqueda = setTimeout(() => {
                    if (table) {
                        table.search(this.value).draw();
                    }
                }, 300);

            });
        }

        function abrirModalMaterial() {
            document.getElementById("tituloMaterial").innerText = "Nuevo Material";
            document.getElementById("materialId").value = "";

            document.querySelector("#modalMaterial form").reset();

            new mdb.Modal(document.getElementById("modalMaterial")).show();
        }


        function editarMaterial(m) {
            document.getElementById("tituloMaterial").innerText = "Editar Material";

            document.getElementById("materialId").value = m._id;
            document.getElementById("nombreMaterial").value = m.nombre;
            document.getElementById("unidadMaterial").value = m.unidad_medida || "";
            document.getElementById("stockMaterial").value = m.stock_actual || "";
            document.getElementById("precioMaterial").value = m.precio_unitario || "";

            new mdb.Modal(document.getElementById("modalMaterial")).show();
        }
        async function guardarMaterial(e) {
            e.preventDefault();

            const id = document.getElementById("materialId").value;

            const data = {
                nombre: document.getElementById("nombreMaterial").value,
                unidad_medida: document.getElementById("unidadMaterial").value,
                stock_actual: Number(document.getElementById("stockMaterial").value),
                precio_unitario: Number(document.getElementById("precioMaterial").value),
                bodega_id: idBodega
            };

            try {
                if (id) {
                    await fetch(`${API_URL}/materiales/${id}`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(data)
                    });
                } else {
                    await fetch(`${API_URL}/materiales`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(data)
                    });
                }

                mdb.Modal.getInstance(document.getElementById("modalMaterial")).hide();
                cargarMateriales();
                window.location.reload();

            } catch (error) {
                console.error(error);
                Swal.fire("Error", "No se pudo guardar", "error");
            }
        }
        async function eliminarMaterial(id) {
            Swal.fire({
                title: "¿Eliminar material?",
                text: "Esta acción no se puede deshacer",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#1D428A",
                cancelButtonColor: "#CD5151",
                confirmButtonText: "Sí, eliminar",
                cancelButtonText: "Cancelar"
            }).then(async (result) => {

                if (result.isConfirmed) {
                    try {
                        await fetch(`${API_URL}/materiales/${id}`, {
                            method: "DELETE"
                        });

                        Swal.fire("Eliminado", "El material fue eliminado", "success");
                        window.location.reload();
                        cargarMateriales();

                    } catch (error) {
                        console.error(error);
                        Swal.fire("Error", "No se pudo eliminar", "error");
                    }
                }

            });
        }
        async function cargarNombreBodega() {
            if (!idBodega) return;

            try {
                const res = await fetch(`${API_URL}/bodegas/${idBodega}`);
                const bodega = await res.json();

                document.getElementById("tituloBodega").innerText =
                    `Materiales en: ${bodega.nombre}`;

            } catch (error) {
                console.error(error);
                document.getElementById("tituloBodega").innerText =
                    "Materiales en bodega";
            }
        }
    </script>
