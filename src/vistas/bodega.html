<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Soft Inmobiliario</title>

    <link rel="stylesheet" href="mdb/css/mdb.min.css">
    <link rel="stylesheet" href="mdb/css/all.min.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/7.2.0/mdb.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        .card-custom {
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.05);
        }

        .btn-main {
            background: #3b6edc;
            color: white;
        }

        .btn-main:hover {
            background: #2d4f91;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: #5A5A5A;
            text-decoration: none !important;
        }

        header {
            padding: 20px;
            position: fixed;
            z-index: 9999;
            width: 100%;
            background-color: transparent !important;
        }

        .header-login {
            padding: 15px !important;
            background-color: transparent !important;
        }

        label {
            font-weight: 400 !important;
        }

        .sidenav {
            background-color: #1d428a !important;
            border-top-right-radius: 30px !important;
            border-bottom-right-radius: 30px !important;
        }

        .container-main {
            padding-left: 3rem;
            padding-right: 3rem;
            padding-top: 1rem;
        }

        a {
            text-decoration: none !important;
        }

        .fa-menu {
            font-size: 1rem;
        }

        .fa-menu:hover {
            color: #ffffff !important;
        }

        .text-bold {
            font-weight: 700;
        }

        .sidenav .sidenav-link {
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
            width: 100%;
        }


        .sidenav .sidenav-link i.fa-menu {
            width: 22px;
            min-width: 22px;
            text-align: center;
        }


        .sidenav .sidenav-link span[data-mdb-slim="false"] {
            flex: 1;
            white-space: nowrap;
        }


        .sidenav-collapse-icon {
            margin-left: auto !important;
            padding-left: 8px;
        }

        [data-mdb-slim="true"] .sidenav-collapse-icon {
            display: none !important;
        }
    </style>

</head>

<body>
    <nav data-mdb-sidenav-init class="sidenav bg-dark" id="sidenav-1" data-mdb-mode="side" data-mdb-slim="false"
        data-mdb-slim-collapsed="false" data-mdb-content="#content" data-mdb-accordion="true" data-mdb-mode="side"
        data-mdb-color="light" data-mdb-scroll-container="#scroll-container">
        <a data-mdb-ripple-init class="d-flex justify-content-center py-4" href="#!" id="slim-toggler"
            data-mdb-ripple-color="primary">
            <img id="PT-logo-full" width="200" src="img/log-azul.png" alt="Logo Portafolio Inmobiliario"
                draggable="false" data-mdb-slim="false" />
            <img id="PT-logo-slim" width="65" src="img/log-azul.png" alt="Logo Portafolio Inmobiliario Slim"
                draggable="false" data-mdb-slim="true" />
        </a>

        <ul class="sidenav-menu">

            <li class="sidenav-item">
                <a href="index.html" class="sidenav-link">
                    <i class="fa fa-home me-3"></i>Inicio
                </a>
            </li>

            <li class="sidenav-item">
                <a href="materiales.html" class="sidenav-link">
                    <i class="fa fa-box me-3"></i>Materiales
                </a>
            </li>

            <li class="sidenav-item">
                <a href="bodega.html" class="sidenav-link">
                    <i class="fa fa-warehouse me-3"></i>Bodegas
                </a>
            </li>

            <li class="sidenav-item">
                <a href="clientes.html" class="sidenav-link">
                    <i class="fa fa-users me-3"></i>Clientes
                </a>
            </li>

            <li class="sidenav-item">
                <a href="departamentos.html" class="sidenav-link">
                    <i class="fa-regular fa-helmet-safety me-3"></i>Departamentos
                </a>
            </li>

            <li class="sidenav-item">
                <a href="proyecto.html" class="sidenav-link">
                    <i class="fa-regular fa-building me-3"></i>Proyectos
                </a>
            </li>

            <li class="sidenav-item">
                <a href="contratos.html" class="sidenav-link">
                    <i class="fa fa-file-contract me-3"></i>Contratos
                </a>
            </li>

            <li class="sidenav-item">
                <a href="login.html" class="sidenav-link">
                    <i class="fa fa-right-from-bracket me-3"></i>Cerrar sesión
                </a>
            </li>

        </ul>
    </nav>

    <main id="content">
        <nav class="navbar sticky-top navbar-expand-lg bg-body-tertiary nav-header">
            <div class="container-fluid">
                <a data-mdb-ripple-init data-mdb-toggle="sidenav" data-mdb-target="#sidenav-1" class="btn-bars p-2"
                    aria-controls="#sidenav-1" aria-haspopup="true">
                    <i class="fas fa-bars"></i>
                </a>

                <span class="fw-bold">Sistema Control Inmobiliario</span>

                <div class="dropdown">
                    <a class="dropdown-toggle d-flex align-items-center" data-mdb-dropdown-init>
                        <img src="https://mdbcdn.b-cdn.net/img/new/avatars/2.webp" class="rounded-circle" height="35">
                    </a>
                </div>

            </div>
        </nav>
        <div class="container mt-4">

            <h4 class="text-primary mb-3">Información Materiales en Bodegas</h4>

            <div class="card card-custom p-4">

                <div class="d-flex justify-content-between align-items-center mb-3">

                    <h5>Materiales en Bodegas</h5>

                    <div class="d-flex gap-2">
                        <div class="input-group">
                            <div class="form-outline" data-mdb-input-init>
                                <input type="search" id="search-inputBodegas" class="form-control" />
                                <label class="form-label" for="search-inputBodegas">Buscar</label>
                            </div>
                            <button type="button" class="btn btn-primary" data-mdb-ripple-init onclick="buscar()">
                                <i class="fas fa-search"></i>
                            </button>
                        </div>
                        <button class="btn btn-outline-primary" data-mdb-modal-init data-mdb-target="#modalMaterial">
                            AGREGAR
                        </button>

                    </div>

                </div>
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Material</th>
                                <th>Bodega</th>
                                <th>Cantidad</th>
                            </tr>
                        </thead>
                        <tbody id="tablaMateriales"></tbody>
                    </table>
                </div>

            </div>

        </div>

    </main>

    <div class="modal fade" id="modalMaterial">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5>Agregar Material</h5>
                    <button class="btn-close" data-mdb-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <form onsubmit="guardarMaterial(event)">

                        <div class="mb-3">
                            <label>Nombre</label>
                            <input type="text" id="nombreMaterial" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label>Bodega</label>
                            <select id="idBodegaSelect" class="form-select" required>
                                <option value="">Seleccione</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label>Stock</label>
                            <input type="number" id="stock" class="form-control" value="0">
                        </div>

                        <button class="btn btn-main w-100">Guardar</button>

                    </form>

                </div>

            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mdb-ui-kit/7.2.0/mdb.umd.min.js"></script>
    <script>

        const API_URL = "http://localhost:5000/api";

        document.addEventListener("DOMContentLoaded", () => {
            cargarDatos();
            cargarBodegas();
        });

        async function cargarDatos() {
            const [resMateriales, resBodegas] = await Promise.all([
                fetch(`${API_URL}/materiales`),
                fetch(`${API_URL}/bodegas`)
            ]);

            const materiales = await resMateriales.json();
            const bodegas = await resBodegas.json();

            const tabla = document.getElementById("tablaMateriales");
            tabla.innerHTML = "";

            materiales.forEach(mat => {
                const bodega = bodegas.find(b => b._id === mat.bodega_id);

                tabla.innerHTML += `
            <tr>
                <td>${mat._id}</td>
                <td>${mat.nombre}</td>
                <td>${bodega ? bodega.nombre : "Sin asignar"}</td>
                <td>${mat.stock_actual || 0}</td>
            </tr>
        `;
            });
        }

        async function cargarBodegas() {
            const res = await fetch(`${API_URL}/bodegas`);
            const bodegas = await res.json();

            const select = document.getElementById("idBodegaSelect");

            bodegas.forEach(b => {
                select.innerHTML += `<option value="${b._id}">${b.nombre}</option>`;
            });
        }

        async function guardarMaterial(e) {
            e.preventDefault();

            const data = {
                nombre: document.getElementById("nombreMaterial").value,
                stock_actual: parseInt(document.getElementById("stock").value) || 0,
                bodega_id: document.getElementById("idBodegaSelect").value
            };

            await fetch(`${API_URL}/materiales`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            cargarDatos();
            e.target.reset();

            const modal = document.getElementById('modalMaterial');
            const instance = mdb.Modal.getInstance(modal);
            instance.hide();
        }

        function buscar() {
            const valor = document.getElementById("search-inputBodegas").value.toLowerCase();
            const filas = document.querySelectorAll("#tablaMateriales tr");

            filas.forEach(f => {
                f.style.display = f.innerText.toLowerCase().includes(valor) ? "" : "none";
            });
        }
        const slimInstance = mdb.Sidenav.getInstance(document.getElementById('sidenav-1'));

        slimInstance.show();

        document.getElementById('slim-toggler').addEventListener('click', () => {
            slimInstance.toggleSlim();
        })
        document.addEventListener('shown.bs.collapse', function (e) {
            const codeBlock = e.target.querySelector("code");
            if (codeBlock) {
                Prism.highlightElement(codeBlock);
            }
        });


    </script>
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.1/dist/js/adminlte.min.js"></script>
    <!-- MDB ESSENTIAL -->
    <script type="text/javascript" src="mdb/js/mdb.umd.min.js"></script>
    <!-- MDB PLUGINS -->
    <script type="text/javascript" src="mdb/plugins/js/all.min.js"></script>
    <script src="https://kit.fontawesome.com/4b2f294736.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.slim.min.js"
        integrity="sha384-4sVjEJ9wB1jL7gYhLq+2iqTt+0nYyK8iZ+QkN0D+Vb5H5DkLtS3qm9Ekf4a8"
        crossorigin="anonymous"></script>
</body>

</html>
