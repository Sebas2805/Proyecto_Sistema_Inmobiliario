                <div class="modal-body">
                    <form onsubmit="guardarBodega(event)">

                        <input type="hidden" id="bodegaId">

    <div class="modal fade" id="modalMaterial" tabindex="-1">

            <div class="modal-content">

                    <h5>Nuevo Material</h5>
                    <button class="btn-close" data-mdb-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form onsubmit="guardarMaterial(event)">

                        <div class="form-outline mb-3" data-mdb-input-init>
                            <input type="text" id="nombreMaterial" class="form-control" required />
                            <label class="form-label">Nombre</label>
                        </div>

                        <div class="form-outline mb-3" data-mdb-input-init>
                            <input type="number" id="stockMaterial" class="form-control" />
                            <label class="form-label">Stock</label>
                        </div>
                        <div class="form-outline mb-3" data-mdb-input-init>
                            <input type="text" id="unidadMaterial" class="form-control" required />
                            <label class="form-label">Unidad de medida</label>
                        </div>

                        <div class="form-outline mb-3" data-mdb-input-init>
                            <input type="number" id="precioMaterial" class="form-control" required />
                            <label class="form-label">Precio unitario</label>
                        </div>

                        <select id="bodegaSelect" data-mdb-select-init>
                        </select>
                        <label class="form-label select-label">Bodega</label>

                        <button class="btn btn-primary w-100 mt-3">Guardar</button>

                    </form>
                </div>

            </div>

    <script>
        if (!localStorage.getItem("usuario")) {
    window.location.href = "index.html";
}
        const API_URL = "http://localhost:5000/api";
        async function cargarBodegas() {
            const res = await fetch(`${API_URL}/bodegas`);
            const bodegas = await res.json();

            const contenedor = document.getElementById("contenedorBodegas");
            contenedor.innerHTML = "";

            bodegas.forEach(b => {
                contenedor.innerHTML += `
      <div class="col-md-6 mb-4 bodega-item">
        <div class="card shadow-sm h-100">

          <div class="card-body">

            <div class="d-flex justify-content-between">

              <div>
                <h6 class="fw-bold">${b.nombre}</h6>
                <p class="text-muted mb-1">
                  <i class="fa-regular fa-location-dot"></i> ${b.ubicacion || "Sin ubicación"}
                </p>
                <p class="mb-0">
                 ${b.encargado || "Sin encargado"}
                </p>
              </div>

              <div class="d-flex flex-column gap-2">
                <button class="btn btn-sm btn-primary"
                  onclick='editarBodega(${JSON.stringify(b)})'>
                  <i class="fa fa-edit"></i>
                </button>

                <button class="btn btn-sm btn-info"
                  onclick="verMateriales('${b._id}')">
                  <i class="fa-light fa-hammer-brush"></i>
                </button>
              </div>

            </div>

          </div>

        </div>
      </div>
    `;
            });
        }
        document.addEventListener("DOMContentLoaded", () => {
            cargarBodegas();
            cargarBodegasSelect();
        });
        document.getElementById("searchBodega").addEventListener("input", function () {
            const valor = this.value.toLowerCase();

            document.querySelectorAll(".bodega-item").forEach(item => {
                item.style.display = item.innerText.toLowerCase().includes(valor)
                    ? ""
                    : "none";
            });
        });

        function abrirModalBodega() {
            document.getElementById("bodegaId").value = "";
            document.getElementById("tituloBodega").innerText = "Nueva Bodega";
            document.querySelector("#modalBodega form").reset();

            new mdb.Modal(document.getElementById("modalBodega")).show();
        }

        function editarBodega(b) {
            document.getElementById("tituloBodega").innerText = "Editar Bodega";

            document.getElementById("bodegaId").value = b._id;
            document.getElementById("nombreBodega").value = b.nombre;
            document.getElementById("ubicacionBodega").value = b.ubicacion;
            document.getElementById("encargadoBodega").value = b.encargado;

            new mdb.Modal(document.getElementById("modalBodega")).show();
        }

        async function guardarBodega(e) {
            e.preventDefault();

            const id = document.getElementById("bodegaId").value;

            const data = {
                nombre: document.getElementById("nombreBodega").value,
                ubicacion: document.getElementById("ubicacionBodega").value,
                encargado: document.getElementById("encargadoBodega").value
            };

            if (id) {
                await fetch(`${API_URL}/bodegas/${id}`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });
            } else {
                await fetch(`${API_URL}/bodegas`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });
            }

            mdb.Modal.getInstance(document.getElementById("modalBodega")).hide();
            cargarBodegas();
        }

        function abrirModalMaterial() {
            document.querySelector("#modalMaterial form").reset();
            new mdb.Modal(document.getElementById("modalMaterial")).show();
        }

        async function cargarBodegasSelect() {
            const res = await fetch(`${API_URL}/bodegas`);
            const data = await res.json();

            const select = document.getElementById("bodegaSelect");
            select.innerHTML = "";

            data.forEach(b => {
                select.innerHTML += `<option value="${b._id}">${b.nombre}</option>`;
            });

            new mdb.Select(select);
        }

        async function guardarMaterial(e) {
            e.preventDefault();

            const data = {
                nombre: document.getElementById("nombreMaterial").value,
                stock_actual: Number(document.getElementById("stockMaterial").value),
                bodega_id: document.getElementById("bodegaSelect").value
            };

            await fetch(`${API_URL}/materiales`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            mdb.Modal.getInstance(document.getElementById("modalMaterial")).hide();
        }


        function verMateriales(id) {
            window.location.href = `materiales.html?bodega=${id}`;
        }
    </script>

        function initMap() {

                center: costaRica,
            });

            new google.maps.Marker({
                position: costaRica,
                map: map,
                title: "Costa Rica",
            });
        }

        window.onload = initMap;
    </script>
